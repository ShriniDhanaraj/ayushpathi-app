name: Deploy to India Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPPLS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPPLS_TOKEN }}
          NEXT_PUBLIC_MAPS_PROVIDER: mappls
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Deploy to India server (SSH → PM2)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}         # IP of Mac Mini or DigitalOcean Bangalore
          username: ${{ secrets.DEPLOY_USER }}      # e.g. ubuntu or your Mac user
          key: ${{ secrets.DEPLOY_SSH_KEY }}        # private key (public key added to server's authorized_keys)
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /var/www/ayushpathi
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm --filter web build
            pm2 restart ayushpathi-web || pm2 start "pnpm --filter web start" --name ayushpathi-web
            pm2 save
