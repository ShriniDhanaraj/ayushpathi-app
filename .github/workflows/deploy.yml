name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPPLS_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPPLS_ACCESS_TOKEN }}
          NEXT_PUBLIC_MAPS_PROVIDER: mappls

      # Deploy via SSH to India server (Mac Mini or DigitalOcean Bangalore)
      # Requires: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY secrets set in GitHub repo settings
      - name: Deploy to India server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/ayushpathi
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm --filter web build
            pm2 restart ayushpathi-web || pm2 start "pnpm --filter web start" --name ayushpathi-web
